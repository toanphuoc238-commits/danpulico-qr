<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đèn LED chiếu sáng 150W — DANPULICO</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;display:flex;justify-content:center;padding:20px 12px 40px}
    .card{background:white;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.12);max-width:420px;width:100%;overflow:hidden}
    .header{background:linear-gradient(135deg,#1a237e 0%,#283593 100%);padding:24px 20px 20px;text-align:center}
    .header img{height:70px;object-fit:contain;margin-bottom:10px}
    .logo-text{color:white;font-size:28px;font-weight:900;letter-spacing:2px;margin-bottom:6px}
    .cong-ty{color:#c5cae9;font-size:12px;line-height:1.5}
    .ten-sp{background:#f5a623;color:white;text-align:center;padding:14px 16px;font-size:18px;font-weight:700}
    .ma-sp{text-align:center;background:#fff8e1;padding:6px;font-size:13px;color:#795548;border-bottom:1px solid #ffe0b2}
    .thong-so{padding:16px 20px}
    .thong-so h3{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#9e9e9e;margin-bottom:12px}
    .row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5;gap:12px}
    .row:last-child{border-bottom:none}
    .label{color:#757575;font-size:14px;min-width:130px}
    .value{color:#212121;font-size:14px;font-weight:600;text-align:right}
    .footer{background:#1a237e;color:white;padding:14px 20px;display:flex;align-items:center;gap:10px;font-size:14px}
    .footer a{color:#c5cae9;text-decoration:none;font-weight:600}
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <img src="logo.png" alt="DANPULICO" onerror="this.style.display='none';document.querySelector('.logo-text').style.display='block'">
      <div class="logo-text" style="display:none">DANPULICO</div>
      <div class="cong-ty">Công ty CP Chiếu sáng công cộng Đà Nẵng</div>
    </div>
    <div class="ten-sp">Đèn LED chiếu sáng 150W</div>
    <div class="ma-sp">Mã sản phẩm: <strong>DPC09-150W</strong></div>
    <div class="thong-so">
      <h3>Thông số kỹ thuật</h3>
      <div class="row"><span class="label">Công suất</span><span class="value">150W</span></div>
      <div class="row"><span class="label">Nhiệt độ màu</span><span class="value">4000K (Trung tính)</span></div>
      <div class="row"><span class="label">Độ kín / Chống va đập</span><span class="value">IP66 / IK08</span></div>
      <div class="row"><span class="label">Năm sản xuất</span><span class="value">2026</span></div>
    </div>
    <div class="footer">
      <span style="font-size:20px">📞</span>
      <div>
        <div style="font-size:11px;color:#9fa8da">Liên hệ hỗ trợ</div>
        <a href="tel:0236.3565741">0236.3565741</a>
      </div>
    </div>
  </div>
</body>
</html>
